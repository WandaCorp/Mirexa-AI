<!-- Overlay del modal de configuración -->
<div class="config-overlay" id="config-overlay" aria-hidden="true"></div>

<!-- Modal de Configuración -->
<div class="config-modal" id="config-modal" role="dialog" aria-label="Configuración" aria-modal="true">
  
  <!-- Header del modal -->
  <div class="config-modal__header">
    <h2 class="config-modal__title">Configuración</h2>
    <button class="config-modal__close-btn" id="config-close-btn" aria-label="Cerrar configuración" title="Cerrar">
      <svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" data-iconid="317810" data-svgname="Actions close simple">
        <defs>
          <style>.cls-1{fill:none;stroke:currentColor;stroke-linecap:round;stroke-linejoin:bevel;stroke-width:1.5px;}</style>
        </defs>
        <g id="ic-actions-close-simple">
          <line class="cls-1" x1="18.36" y1="18.36" x2="5.64" y2="5.64"></line>
          <line class="cls-1" x1="18.36" y1="5.64" x2="5.64" y2="18.36"></line>
        </g>
      </svg>
    </button>
  </div>

  <!-- Cuerpo del modal (scrollable) -->
  <div class="config-modal__body">
    
    <!-- ============================================ -->
    <!-- SWITCHES -->
    <!-- ============================================ -->
    
    <div class="config-section">
      
      <!-- Switch: Enviar al presionar Enter -->
      <div class="config-switch-row">
        <span class="config-switch-row__label">Enviar al presionar Enter</span>
        <button 
          class="config-switch" 
          id="switch-enter-send" 
          role="switch" 
          aria-checked="true"
          aria-label="Enviar al presionar Enter"
        >
          <span class="config-switch__track">
            <span class="config-switch__thumb"></span>
          </span>
        </button>
      </div>

      <!-- Switch: No guardar consultas en el historial -->
      <div class="config-switch-row">
        <span class="config-switch-row__label">No guardar consultas en el historial</span>
        <button 
          class="config-switch" 
          id="switch-no-history" 
          role="switch" 
          aria-checked="true"
          aria-label="No guardar consultas en el historial"
        >
          <span class="config-switch__track">
            <span class="config-switch__thumb"></span>
          </span>
        </button>
      </div>

    </div>

    <!-- ============================================ -->
    <!-- BOTÓN ELIMINAR HISTORIAL -->
    <!-- ============================================ -->
    
    <div class="config-section config-section--centered">
      <button class="config-delete-btn" id="btn-delete-history">
        Eliminar todo el historial de consultas
      </button>
    </div>

    <!-- ============================================ -->
    <!-- CONFIGURACIÓN DE RESPUESTA (Radio Buttons) -->
    <!-- ============================================ -->
    
    <div class="config-section config-section--bordered">
      <h3 class="config-section__title">Configuración de respuesta</h3>
      
      <div class="config-radio-group">
        
        <!-- Opción: Respuesta Estándar -->
        <label class="config-radio-card">
          <input 
            type="radio" 
            name="response-mode" 
            value="standard" 
            class="config-radio-card__input"
            checked
          />
          <span class="config-radio-card__label">Respuesta Estándar</span>
          <span class="config-radio-card__indicator"></span>
        </label>

        <!-- Opción: Solo Resultado -->
        <label class="config-radio-card">
          <input 
            type="radio" 
            name="response-mode" 
            value="result-only" 
            class="config-radio-card__input"
          />
          <span class="config-radio-card__label">Solo Resultado</span>
          <span class="config-radio-card__indicator"></span>
        </label>

        <!-- Opción: Resultado y explicación -->
        <label class="config-radio-card">
          <input 
            type="radio" 
            name="response-mode" 
            value="result-explanation" 
            class="config-radio-card__input"
          />
          <span class="config-radio-card__label">Resultado y explicación</span>
          <span class="config-radio-card__indicator"></span>
        </label>

      </div>
    </div>
    
    <!-- Social media-->
    <div class="social-media-container">
        <button class="discord-btn">
          <svg fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" xml:space="preserve" data-iconid="333523" data-svgname="Discord alt"><path d="M18.942 5.556a16.299 16.299 0 0 0-4.126-1.297c-.178.321-.385.754-.529 1.097a15.175 15.175 0 0 0-4.573 0 11.583 11.583 0 0 0-.535-1.097 16.274 16.274 0 0 0-4.129 1.3c-2.611 3.946-3.319 7.794-2.965 11.587a16.494 16.494 0 0 0 5.061 2.593 12.65 12.65 0 0 0 1.084-1.785 10.689 10.689 0 0 1-1.707-.831c.143-.106.283-.217.418-.331 3.291 1.539 6.866 1.539 10.118 0 .137.114.277.225.418.331-.541.326-1.114.606-1.71.832a12.52 12.52 0 0 0 1.084 1.785 16.46 16.46 0 0 0 5.064-2.595c.415-4.396-.709-8.209-2.973-11.589zM8.678 14.813c-.988 0-1.798-.922-1.798-2.045s.793-2.047 1.798-2.047 1.815.922 1.798 2.047c.001 1.123-.793 2.045-1.798 2.045zm6.644 0c-.988 0-1.798-.922-1.798-2.045s.793-2.047 1.798-2.047 1.815.922 1.798 2.047c0 1.123-.793 2.045-1.798 2.045z"></path></svg>
          <a href="https://discord.gg/kp4CdaM5r" target="_blank">Únetenos en Discord</a>
        </button>
      </div>
      
  </div>
</div>
